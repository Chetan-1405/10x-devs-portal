[server]
headless = true
maxUploadSize = 50
enableXsrfProtection = true
enableCORS = true

[browser]
gatherUsageStats = false

[client]
showErrorDetails = "none"
toolbarMode = "minimal"

[theme]
base = "light"
primaryColor = "#EF3340"
backgroundColor = "#F5F7FB"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#172033"
linkColor = "#C91F32"
borderColor = "#DCE3EC"
showWidgetBorder = true
baseRadius = "medium"
buttonRadius = "medium"
font = "sans-serif"
headingFont = "sans-serif"
codeFont = "monospace"

[theme.sidebar]
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F8FAFC"
textColor = "#172033"
borderColor = "#DCE3EC"